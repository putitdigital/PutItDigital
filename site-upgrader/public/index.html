<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../photos/favicon.ico">
    <title>Site Upgrader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Website Rebuilder</p>
        <h1>Site Upgrader Web App</h1>
        <p class="subtext">Paste a URL, download the site snapshot, apply automatic quality upgrades, and export an improved static version.</p>
      </header>

      <section class="card" aria-label="Upgrade form">
        <form id="upgradeForm">
          <label for="url">Website URL</label>
          <input id="url" name="url" type="url" placeholder="https://your-site.com" required>

          <div class="row">
            <div>
              <label for="project">Project Name</label>
              <input id="project" name="project" type="text" value="improved-site" required>
            </div>
            <div>
              <label for="depth">Depth (1-5)</label>
              <input id="depth" name="depth" type="number" min="1" max="5" value="1" required>
            </div>
            <div>
                <label for="levels">Levels</label>
                <select id="levels" name="levels">
                  <option value="1" selected>normal</option>
                  <option value="2">professional</option>
                  <option value="3">advanced</option>
                  <option value="6">luxury</option>
                </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="mode">Visual Mode</label>
              <select id="mode" name="mode">
                <option value="balanced" selected>Balanced</option>
                <option value="aggressive">Aggressive</option>
              </select>
            </div>
          </div>

          <button id="runBtn" type="submit">Upgrade Website</button>
          
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="card" aria-label="Result" id="resultCard" hidden>
        <h2>Result</h2>
        <p id="resultMessage"></p>
        <div class="result-grid">
          <p><strong>Original:</strong> <span id="originalPath"></span></p>
          <p><strong>Improved:</strong> <span id="improvedPath"></span></p>
          <p><strong>Report:</strong> <span id="reportPath"></span></p>
          <p><strong>Preview:</strong> <a id="previewLink" href="#" target="_blank" rel="noopener">Open improved index</a></p>
        </div>
        <h3>Improvements</h3>
        <pre id="improvementsJson"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
